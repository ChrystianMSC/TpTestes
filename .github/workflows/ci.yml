name: CI Card Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4.2.2 # Versão patch estável

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5.3.0 # Versão patch estável
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: Run Tests with Coverage
      run: |
        python -m pytest --cov=src --cov-report=xml tests/

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5 # <--- ATUALIZADO: Versão 5 já migrada para Node recente
      with:
        token: ${{ secrets.CODECOV_TOKEN }}